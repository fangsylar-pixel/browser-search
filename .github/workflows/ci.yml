name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest pytest-cov
      
      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium
      
      - name: Run tests
        run: |
          python -m pytest tests/ --cov=browser_search_mcp --cov-report=xml -v || echo "No tests yet"
      
      - name: Verify import
        run: |
          python -c "from browser_search_mcp import config, cdp, search, server, parsers, bridge; print('OK')"
